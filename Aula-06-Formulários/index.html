<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro</title>
</head>
<body>
    <header>
        <h1>Formulário de Cadastro</h1>
    </header>
    <main>
        <section>
            <!--Formulário de cadastro-->
            <form action="sucesso.html" method="POST">
                <fieldset>
                    <legend>Dados Pessoais</legend>
                    <label for="nome">Nome Completo:</label><br>
                    <input type="text" name="nome" id=nome placeholder="Insira o seu Nome Completo"
                    required><br>
                    <label for="email">Email:</label><br>
                    <input type="email" name="Email" id="email"
                    placeholder="Insira seu E-mail" required>
                    <br>
                    <label for="Password">Senha:</label><br>
                    <input type="password" name="password"
                    id="password" placeholder="Insira sua Senha"
                    required>
                    <br>
                    <label for="nascimento">Data de nascimento:</label><br>
                    <input type="date" name="nascimento"
                    id="nascimento"><br>
                    <label for="sexo">Sexo:</label><br>
                    <input type="radio" name="sexo" id="masc"
                    value="m">Masculino
                    <input type="radio" name="sexo" id="fem"
                    value="f">Feminino
                </fieldset>
                <fieldset>
                    <legend>Dados do produto:</legend>
                    <label for="quantidade">Quantidade:</label>
                    <input type="number" name="quantidade"
                    id="quantidade" min="1" max="10"><br>
                    <label for="cor">Cor do Produto:</label><br>
                    <input type="color">
                    <label for="entrega">Agendar entrega para data:</label><br>
                    <input type="datatime-local">
                    <label for="frete">Selecione o frete:</label><br>
                    <select name="frete" id="frete">
                        <option value="pac">Pac</option>
                        <option value="sedex">Sedex</option>
                        <option value="sedex10">Sedex 10</option>
                    </select><br><br>
                    <label for="observacoes">Observações</label>
                    <textarea rown="4" cols="40" name="observacoes"
                    id="observacoes" placeholder="Escreva aqui observações sobre o produto">
                    </textarea><br><br>

                    <a href="termos.html">

                    <input type="checkbox" name="termos" id="termos">
                    Li e aceito os termos de uso da plataforma.

                    <button type="button">Ler os termos de uso</button>
                    </a>

                    <br>
                    <button type="submit">Enviar</button>
                    <button type="reset">Limpar</button>

                </fieldset>
            
            </form>
        </section>
    </main>
    
</body>
</html>
