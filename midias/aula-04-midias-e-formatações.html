<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Fotos</title>
</head>
<body>
    <header>
        <h1>Galeria de Fotos:</h1>
    </header>
    <main> 
        <section>
            <!-- Importando imagem local -->
            <img src="imagem.jpg" alt="Paisagem" width="450px" height="450px">
            <br><br><br>
             <!-- Importando imagens externas -->
            <img src="https://picsum.photos/id/47/400/300" alt="Imagem 01">
            <img src="https://picsum.photos/id/48/400/300" alt="Imagem 02">
            <img src="https://picsum.photos/id/49/400/300" alt="Imagem 03">
            <img src="https://picsum.photos/id/50/400/300" alt="Imagem 04">
            <img src="https://picsum.photos/id/51/400/300" alt="Imagem 05">
            <img src="https://picsum.photos/id/52/400/300" alt="Imagem 06">
            <img src="https://picsum.photos/id/53/400/300" alt="Imagem 07">
            <img src="https://picsum.photos/id/54/400/300" alt="Imagem 08">
            <img src="https://picsum.photos/id/55/400/300" alt="Imagem 09">
            <img src="https://picsum.photos/id/56/400/300" alt="Imagem 10">
            <img src="https://picsum.photos/id/57/400/300" alt="Imagem 11">
            <img src="https://picsum.photos/id/58/400/300" alt="Imagem 12">

        </section>
        <br><br><br>
        <!-- Imagem com legenda -->
        <section>
          <figure>
            <img src="grafico.png" alt="Gráfico de crescimento anual da empresa." width="300px">
              <figcaption>Gráfico de crescimento anual da empresa no ano de 2025.</figcaption>
          </figure>
        </section>
    </main>
    <hr>
    <footer>
        <p><em>&copy 2026 - FATEC Registro - DSM</em></p>
    </footer>
</body>
</html>
